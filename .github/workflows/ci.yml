name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  node-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  deno-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task check
      - run: deno run -A src/cli-deno/mod.ts encode --song "WHENIFINDMYSELFINSLOW" --mi 12345 --date 1752-09-03 --personal-id 7 --message HELLO123 --json
